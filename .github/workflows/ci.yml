name: PhishGuard-X CI/CD Pipeline

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

jobs:
  test-and-build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Code Repository
      uses: actions/checkout@v3

    - name: Set up Python 3.12
      uses: actions/setup-python@v4
      with:
        python-version: '3.12'

    - name: Install Dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt
        pip install pytest pytest-cov flake8

    - name: Lint Code Quality
      run: |
        # stop build if there are Python syntax errors
        flake8 . --count --select=E9,F63,F7,F82 --show-source --statistics

    - name: Run Automated Pytest Suite
      run: |
        python -m pytest tests/ --doctest-modules --junitxml=junit/test-results.xml --cov=. --cov-report=xml

    - name: Build Docker Container Image
      run: |
        docker build -t phishguardx/phishguard-api:latest .
