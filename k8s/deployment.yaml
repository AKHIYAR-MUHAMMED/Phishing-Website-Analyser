apiVersion: apps/v1
kind: Deployment
metadata:
  name: phishguard-x-deployment
  labels:
    app: phishguard-x
spec:
  replicas: 3
  selector:
    matchLabels:
      app: phishguard-x
  template:
    metadata:
      labels:
        app: phishguard-x
    spec:
      containers:
      - name: phishguard-x-api
        image: phishguardx/phishguard-api:latest
        imagePullPolicy: Always
        ports:
        - containerPort: 8000
        env:
        - name: ENVIRONMENT
          value: "production"
        resources:
          requests:
            memory: "512Mi"
            cpu: "250m"
          limits:
            memory: "2Gi"
            cpu: "1000m"
        livenessProbe:
          httpGet:
            path: /api/v1/health
            port: 8000
          initialDelaySeconds: 15
          periodSeconds: 10
        readinessProbe:
          httpGet:
            path: /api/v1/health
            port: 8000
          initialDelaySeconds: 5
          periodSeconds: 5
---
apiVersion: v1
kind: Service
metadata:
  name: phishguard-x-service
spec:
  type: LoadBalancer
  ports:
  - port: 80
    targetPort: 8000
    protocol: TCP
    name: http
  selector:
    app: phishguard-x
---
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: phishguard-x-hpa
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: phishguard-x-deployment
  minReplicas: 3
  maxReplicas: 10
  metrics:
  - type: Resource
    resource:
      name: cpu
      target:
        type: Utilization
        averageUtilization: 75
